name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bunx eslint . --max-warnings 0

      - name: Type check
        run: bun run tsc --noEmit

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Check bundle size
        run: |
          MAIN_SIZE=$(find dist/assets -name '*.js' -exec du -b {} + | sort -rn | head -1 | awk '{print $1}')
          echo "Largest JS chunk: $(echo "scale=2; $MAIN_SIZE / 1024 / 1024" | bc) MB"
          # Fail if any single chunk exceeds 500KB
          if [ "$MAIN_SIZE" -gt 512000 ]; then
            echo "⚠️ WARNING: Largest chunk exceeds 500KB target"
          fi

      # Post-merge smoke tests against PROD Supabase. Only runs on push to main,
      # never on pull_request. Reason: SUPABASE_SERVICE_ROLE_KEY_TEST bypasses RLS
      # and must not be exposed to untrusted PR code. PR-time regression coverage
      # lives in the smoke-local job below (local Supabase, no prod secrets).
      # If the secret isn't configured yet, shouldRunSmoke returns false and every
      # test skips — step exits 0.
      - name: Smoke tests (prod)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RUN_SMOKE: "1"
          SMOKE_TARGET: prod
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY_TEST: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_TEST }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: bun run test:smoke

  # P0d-ii — Smoke tests against local Supabase booted via Supabase CLI in Docker.
  # Decision rationale: see the P0d-ii ADR block in LAUNCH_PLAN.md.
  # Drift-repair rationale (Strategy V — baseline as sole truth): see the P0d-iv
  # section of LAUNCH_PLAN.md.
  #
  # Guarantees:
  #   - CLI version is pinned — never `latest` — so the CI-local stack matches
  #     what developers boot. Drift is the #1 cause of "works on my machine"
  #     smoke failures.
  #   - `supabase db reset` hard-fails on any migration error. Tests never run
  #     against a partially-applied schema and report green.
  #   - No prod secrets exposed. Safe on untrusted PR code.
  smoke-local:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      # PIN the Supabase CLI version. Bump deliberately when syncing with the
      # dev environment — never silently via `latest`.
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: "1.226.4"

      # Boot the local stack. Skip imgproxy / studio / inbucket — smoke tests
      # don't need them, shaving boot time. Edge-runtime stays on because
      # P0d-iii will need it for the Gemini/Stripe-dependent flows.
      - name: Start Supabase
        run: supabase start --exclude imgproxy --exclude studio --exclude inbucket

      # Hard-fail on migration errors. `db reset` drops the local DB and
      # re-applies every migration in supabase/migrations/ in timestamp order.
      # Non-zero exit on any migration failure fails the CI step.
      - name: Apply migrations (hard-fail on error)
        run: supabase db reset --no-seed

      # Read local API URL + keys from the CLI (non-secret — generated from
      # the well-known local JWT signing secret) and hand them to the harness
      # via the same env-var names the prod job uses. The harness itself
      # doesn't branch on SMOKE_TARGET for credentials; the target switch is
      # purely a signal that downstream mock-server plumbing should be booted
      # (P0d-iii onward).
      - name: Export local credentials
        run: |
          STATUS=$(supabase status --output json)
          echo "SUPABASE_URL=$(echo "$STATUS" | jq -r '.API_URL')" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$(echo "$STATUS" | jq -r '.ANON_KEY')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY_TEST=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_ENV

      # P0d-iii — Boot the Gemini mock server on port 54330, bound to
      # 0.0.0.0 so the edge-runtime Docker container can reach it via the
      # Supabase network bridge gateway. The mock intercepts the OpenAI-
      # compatible chat/completions endpoint AND Gemini's native
      # generateContent endpoint (used by image-gen + render-eligibility).
      - name: Start mock Gemini server
        run: |
          nohup bun run src/test/smoke/mocks/start-mock-server.ts > mock-server.log 2>&1 &
          echo $! > mock-server.pid
          for i in $(seq 1 20); do
            if curl -fsS -X POST http://127.0.0.1:54330/v1beta/openai/chat/completions \
              -H 'Content-Type: application/json' \
              -d '{"messages":[{"role":"user","content":"ping"}]}' > /dev/null 2>&1; then
              echo "mock-server up"
              break
            fi
            sleep 0.5
          done
        env:
          MOCK_SERVER_PORT: "54330"

      # Discover the Supabase-network bridge gateway so the edge-runtime
      # container can reach the mock. Docker Desktop resolves
      # host.docker.internal but GitHub Actions' Linux Docker does not map
      # it by default — use the network's gateway IP which is always
      # routable from inside containers on that bridge.
      - name: Resolve container→host URL
        run: |
          GATEWAY=$(docker network inspect supabase_network_khvkwojtlkcvxjxztduj \
            --format '{{(index .IPAM.Config 0).Gateway}}')
          if [ -z "$GATEWAY" ]; then
            echo "Failed to discover supabase network gateway IP"
            exit 1
          fi
          echo "MOCK_BASE_URL=http://$GATEWAY:54330" >> $GITHUB_ENV

      # Write an env file that `supabase functions serve` will inject into
      # the edge-runtime container. GEMINI_API_KEY is required by callBursAI
      # even when the URL is mocked (the function short-circuits on missing
      # key before it ever calls fetch). The three URL overrides cover every
      # Gemini entry-point the smoke-tested functions reach:
      #   - GEMINI_URL_OVERRIDE        → burs-ai.ts (22 AI functions)
      #   - GEMINI_IMAGE_URL_OVERRIDE  → gemini-image-client.ts (render_garment_image)
      #   - GEMINI_TEXT_URL_OVERRIDE   → render-eligibility.ts (render gate)
      - name: Write edge-function env file
        run: |
          cat > supabase/functions/.env.smoke <<EOF
          GEMINI_API_KEY=smoke-test-mock-key
          GEMINI_URL_OVERRIDE=${MOCK_BASE_URL}/v1beta/openai/chat/completions
          GEMINI_IMAGE_URL_OVERRIDE=${MOCK_BASE_URL}/v1beta/models/gemini-2.5-flash-image:generateContent
          GEMINI_TEXT_URL_OVERRIDE=${MOCK_BASE_URL}/v1beta/models/gemini-2.5-flash:generateContent
          EOF

      # Replace the edge-runtime started by `supabase start` with a new
      # runtime whose env file includes our mock URLs. `supabase functions
      # serve` stops + restarts the edge runtime container in-place, so
      # callers still reach functions at http://127.0.0.1:54321/functions/v1.
      - name: Start supabase functions serve with mock URLs
        run: |
          nohup supabase functions serve \
            --env-file supabase/functions/.env.smoke \
            --no-verify-jwt > functions-serve.log 2>&1 &
          echo $! > functions-serve.pid
          for i in $(seq 1 40); do
            if curl -fsS -X POST http://127.0.0.1:54321/functions/v1/visual_search \
              -H 'Authorization: Bearer not-a-valid-jwt' \
              -H 'Content-Type: application/json' \
              -d '{}' | grep -q "Unauthorized"; then
              echo "functions-serve up"
              break
            fi
            sleep 1
          done

      - name: Run smoke tests against local Supabase
        env:
          RUN_SMOKE: "1"
          SMOKE_TARGET: local
          # Sentinel for the 7 AI smoke tests — they gate on this via
          # shouldRunAiSmoke in harness.ts. The value is not read at
          # runtime (tests invoke functions through the supabase-js
          # client; the URL override is read by the edge-runtime from
          # the .env.smoke file above). Setting it here just flips the
          # test-gate from skip → run.
          GEMINI_URL_OVERRIDE: "http://mock-sentinel-do-not-use-directly/"
        run: bun run test:smoke

      - name: Show background logs on failure
        if: failure()
        run: |
          echo "=== mock-server.log ===" && cat mock-server.log || true
          echo "=== functions-serve.log ===" && cat functions-serve.log || true

      - name: Tear down mock server + functions serve
        if: always()
        run: |
          if [ -f mock-server.pid ]; then kill "$(cat mock-server.pid)" 2>/dev/null || true; fi
          if [ -f functions-serve.pid ]; then kill "$(cat functions-serve.pid)" 2>/dev/null || true; fi

      - name: Stop Supabase
        if: always()
        run: supabase stop

  # P0e — Migration drift detection. Only runs when a PR (or push to main)
  # touches files under `supabase/migrations/`. Guards against the drift
  # pattern that P0d-iv had to clean up retroactively: local file timestamps
  # diverging from the remote `supabase_migrations.schema_migrations` table.
  #
  # Gating strategy: `paths`-based trigger alone would make the ENTIRE workflow
  # conditional (including build-and-test + smoke-local), which we don't want.
  # Instead, run unconditionally at the job level and gate the actual check
  # with a shell `git diff` against the base ref. This keeps build-and-test
  # and smoke-local running on every PR while the drift check only fires
  # when migrations change.
  #
  # Secrets required (repo-level): SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD.
  # If SUPABASE_ACCESS_TOKEN is missing when a migration file changes, the
  # job fails LOUDLY rather than silently skipping — see the P0d-iv finding
  # about silent-skip CI hiding broken tests.
  migration-drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so `git diff` against the base ref resolves.
          fetch-depth: 0

      - name: Detect migration changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            # push to main — compare against previous commit on main
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi
          # Guard against the all-zeros SHA GitHub sends for first push to a
          # brand-new branch — fall back to HEAD^ so the diff still resolves.
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA=$(git rev-parse "$HEAD_SHA^" 2>/dev/null || echo "$HEAD_SHA")
          fi
          echo "Comparing $BASE_SHA...$HEAD_SHA"
          # Three-dot form = diff from merge-base(BASE,HEAD) to HEAD, so we
          # only see what this PR actually changed. Two-dot form would leak
          # migrations added to main after the branch diverged (Codex round 1).
          if git diff --name-only "$BASE_SHA...$HEAD_SHA" | grep -q '^supabase/migrations/'; then
            echo "migrations_changed=true" >> "$GITHUB_OUTPUT"
            echo "Migration files changed — drift check will run."
          else
            echo "migrations_changed=false" >> "$GITHUB_OUTPUT"
            echo "No migration files changed — drift check will be skipped."
          fi

      - name: Setup Supabase CLI
        if: steps.detect.outputs.migrations_changed == 'true'
        uses: supabase/setup-cli@v1
        with:
          # Match the pinned version used by smoke-local. Bump both together.
          version: "1.226.4"

      - name: Check migration drift
        if: steps.detect.outputs.migrations_changed == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Cannot check migration drift. Add it as a repo secret (see https://supabase.com/dashboard/account/tokens)."
            exit 1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not set. Cannot check migration drift. Add it as a repo secret."
            exit 1
          fi

          echo "::group::Link to remote project"
          supabase link --project-ref khvkwojtlkcvxjxztduj
          echo "::endgroup::"

          echo "::group::Migration list (Local vs Remote)"
          supabase migration list --linked
          echo "::endgroup::"

          echo "::group::Dry-run push"
          # --dry-run catches any remote-only or timestamp-mismatch drift. New
          # migrations introduced by this PR will list as pending, which is
          # expected and non-fatal; only actual drift fails the step.
          # Pin v1.226.4 CLI: --yes was added in v2.x, not available here.
          # --password flag is the non-interactive auth path; SUPABASE_DB_PASSWORD
          # env var exposed above.
          supabase db push --linked --dry-run --password "$SUPABASE_DB_PASSWORD"
          echo "::endgroup::"
