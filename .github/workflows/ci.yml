name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bunx eslint . --max-warnings 0

      - name: Type check
        run: bun run tsc --noEmit

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Check bundle size
        run: |
          MAIN_SIZE=$(find dist/assets -name '*.js' -exec du -b {} + | sort -rn | head -1 | awk '{print $1}')
          echo "Largest JS chunk: $(echo "scale=2; $MAIN_SIZE / 1024 / 1024" | bc) MB"
          # Fail if any single chunk exceeds 500KB
          if [ "$MAIN_SIZE" -gt 512000 ]; then
            echo "⚠️ WARNING: Largest chunk exceeds 500KB target"
          fi

      # P0d — Smoke tests. Only runs on push to main (post-merge), never on pull_request.
      # Reason: SUPABASE_SERVICE_ROLE_KEY_TEST bypasses RLS and must not be exposed to
      # untrusted PR code. Moving smoke to post-merge means regressions are caught by
      # the first push after a merge, not at PR time — acceptable tradeoff vs exfil risk.
      # If the secret isn't configured yet, shouldRunSmoke returns false and every test
      # skips — step exits 0.
      - name: Smoke tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RUN_SMOKE: "1"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY_TEST: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_TEST }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: bun run test:smoke
