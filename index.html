   <body style="background:#F5F0E8">
   <script>
   (function(){
     // Set initial background to prevent flash, then hand off to CSS variable
     var d=document.documentElement,b=document.body;
      var storedTheme=localStorage.getItem('burs-theme');
      if(d.classList.contains('dark')||storedTheme==='dark'||(storedTheme==='system'&&window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
       b.style.background='#0D0D0D';
     }
     // Once CSS loads, let the variable take over
     var s=document.createElement('style');
     s.textContent='body{background:hsl(var(--background))!important}';
     d.appendChild(s);
   })();
   </script>
